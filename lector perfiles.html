<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi GitHub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }

    h1 span {
      color: #FF6A00;
    }

    /* ── Formulario ── */
    .buscador {
      display: flex;
      gap: 0.5rem;
      max-width: 500px;
      margin: 0 auto 2rem;
    }

    .buscador input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #f5f5f5;
      font-size: 1rem;
    }

    .buscador input:focus {
      outline: none;
      border-color: #FF6A00;
    }

    .buscador button {
      padding: 0.6rem 1.2rem;
      background: #FF6A00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .buscador button:hover {
      background: #e55d00;
    }

    /* ── Error ── */
    #error {
      text-align: center;
      color: #ff4d4d;
      margin-bottom: 1rem;
      display: none;
    }

    /* ── Perfil ── */
    #perfil {
      max-width: 500px;
      margin: 0 auto;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 1.2rem;
      display: none;
    }

    .perfil-cabecera {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .perfil-cabecera img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #FF6A00;
    }

    .perfil-cabecera h2 {
      font-size: 1.2rem;
    }

    .perfil-cabecera p {
      font-size: 0.85rem;
      color: #b3b3b3;
      margin-top: 0.2rem;
    }

    /* ── Lista repositorios ── */
    h3 {
      font-size: 1rem;
      margin-bottom: 0.8rem;
      border-left: 3px solid #FF6A00;
      padding-left: 0.5rem;
    }

    #lista-repos {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    #lista-repos li {
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
    }

    #lista-repos li a {
      color: #FF6A00;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.95rem;
    }

    #lista-repos li a:hover {
      text-decoration: underline;
    }

    #lista-repos li p {
      font-size: 0.82rem;
      color: #b3b3b3;
      margin-top: 0.2rem;
    }

    /* ── Cargando ── */
    #cargando {
      text-align: center;
      color: #b3b3b3;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Perfil de <span>GitHub</span></h1>

  <div class="buscador">
    <input type="text" id="input-usuario" placeholder="Usuario de GitHub..." />
    <button onclick="buscarPerfil()">Buscar</button>
  </div>

  <p id="error"></p>
  <p id="cargando">Cargando...</p>

  <div id="perfil">
    <div class="perfil-cabecera">
      <img id="avatar" src="" alt="Avatar" />
      <div>
        <h2 id="nombre"></h2>
        <p id="bio"></p>
      </div>
    </div>

    <h3>Repositorios públicos</h3>
    <ul id="lista-repos"></ul>
  </div>

  <script>
    // Busca el perfil y sus repositorios en la API de GitHub
    async function buscarPerfil() {
      var usuario = document.getElementById("input-usuario").value.trim();

      // Ocultar resultados anteriores
      document.getElementById("perfil").style.display = "none";
      document.getElementById("error").style.display  = "none";

      // Validar que no esté vacío
      if (usuario === "") {
        mostrarError("Escribe un nombre de usuario.");
        return;
      }

      document.getElementById("cargando").style.display = "block";

      // Llamada a la API — datos del usuario
      var respuestaUsuario = await fetch("https://api.github.com/users/" + usuario);

      if (!respuestaUsuario.ok) {
        document.getElementById("cargando").style.display = "none";
        mostrarError("Usuario no encontrado.");
        return;
      }

      var datosUsuario = await respuestaUsuario.json();

      // Llamada a la API — repositorios del usuario
      var respuestaRepos = await fetch("https://api.github.com/users/" + usuario + "/repos?per_page=10&sort=updated");
      var repos = await respuestaRepos.json();

      document.getElementById("cargando").style.display = "none";

      // Rellenar perfil
      document.getElementById("avatar").src      = datosUsuario.avatar_url;
      document.getElementById("nombre").textContent = datosUsuario.name || datosUsuario.login;
      document.getElementById("bio").textContent    = datosUsuario.bio  || "Sin bio";

      // Rellenar lista de repositorios
      var lista = document.getElementById("lista-repos");
      lista.innerHTML = ""; // limpiar lista anterior

      for (var i = 0; i < repos.length; i++) {
        var repo = repos[i];

        var li          = document.createElement("li");
        var enlace      = document.createElement("a");
        var descripcion = document.createElement("p");

        enlace.href        = repo.html_url;
        enlace.target      = "_blank";
        enlace.textContent = repo.name;

        descripcion.textContent = repo.description || "Sin descripción";

        li.appendChild(enlace);
        li.appendChild(descripcion);
        lista.appendChild(li);
      }

      document.getElementById("perfil").style.display = "block";
    }

    function mostrarError(mensaje) {
      var errorEl = document.getElementById("error");
      errorEl.textContent    = "⚠️ " + mensaje;
      errorEl.style.display  = "block";
    }
  </script>

</body>
</html>
